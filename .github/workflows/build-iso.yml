name: Build ShieldOS 0.3.3 UI Identity VM ISO

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-iso:
    name: Build bootable ShieldOS 0.3 ISO
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Stage files for Nix flake source
        run: |
          set -euo pipefail
          # Nix flakes built from git only see tracked/staged files.
          # This protects manual GitHub uploads where new assets exist but are not in the flake source yet.
          git add -A
          git status --short

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            max-jobs = auto
            cores = 0

      - name: Show system info
        run: |
          nix --version
          df -h

      - name: Preflight removed package alias check
        run: |
          set -euo pipefail
          if grep -R --include='*.nix' -nE 'python3Full|python311Full|tor-browser-bundle-bin|noto-fonts-emoji|noto-fonts-extra|wineWowPackages|services\.resolved\.extraConfig|isoImage\.isoName|python3Packages\.tkinter' .; then
            echo "Found removed/deprecated NixOS package or option in .nix files. Replace it before building." >&2
            exit 1
          fi

      - name: Check ShieldOS source files
        run: |
          set -euo pipefail
          test -f modules/identity.nix
          test -f apps/shield-center/shield_apps.py
          test -f modules/shield-center.nix
          if grep -R --include='*.nix' -n '../assets/identity' modules hosts; then
            echo "External identity asset paths are not allowed in .nix files for this build." >&2
            exit 1
          fi

      - name: Check flake syntax
        run: nix flake check --show-trace -L

      - name: Build live/install ISO
        run: |
          nix build .#nixosConfigurations.shieldos-iso.config.system.build.isoImage --show-trace -L
          mkdir -p dist
          cp -v result/iso/*.iso dist/
          ls -lh dist

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: ShieldOS-0.3.3-UI-Identity-VM-ISO
          path: dist/*.iso
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
